<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIS Анимация с эффектами</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #111, #444, #111, #444);
            background-size: 400% 400%;
            animation: gradientAnimation 10s ease infinite;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: #fff;
            height: 100vh;
        }

        /* Анимация градиента фона */
        @keyframes gradientAnimation {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Стиль для слов VIS */
        .vis {
            position: absolute;
            font-size: 30px;
            font-weight: bold;
            opacity: 0;
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00, 0 0 20px #00ff00, 0 0 25px #00ff00;
            pointer-events: none;
            animation: appear 5s infinite, randomMovement 10s infinite, colorChange 3s infinite;
        }

        /* Анимация появления */
        @keyframes appear {
            0% {
                opacity: 0;
                transform: scale(0.5) translateY(-50px);
            }
            25% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            50% {
                opacity: 0;
                transform: scale(1.2) translateY(50px);
            }
            100% {
                opacity: 0;
                transform: scale(0.5) translateY(-50px);
            }
        }

        /* Случайное движение */
        @keyframes randomMovement {
            0% {
                top: 10%;
                left: 10%;
            }
            25% {
                top: 40%;
                left: 70%;
            }
            50% {
                top: 60%;
                left: 20%;
            }
            75% {
                top: 80%;
                left: 80%;
            }
            100% {
                top: 30%;
                left: 50%;
            }
        }

        /* Плавное изменение цвета текста */
        @keyframes colorChange {
            0% {
                color: #00ff00;
                text-shadow: 0 0 15px #00ff00, 0 0 20px #00ff00, 0 0 25px #00ff00;
            }
            50% {
                color: #ff00ff;
                text-shadow: 0 0 15px #ff00ff, 0 0 20px #ff00ff, 0 0 25px #ff00ff;
            }
            100% {
                color: #00ff00;
                text-shadow: 0 0 15px #00ff00, 0 0 20px #00ff00, 0 0 25px #00ff00;
            }
        }

        /* Отключаем выделение текста и копирование */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            -webkit-touch-callout: none; /* Для iOS */
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <script>
        // Функция для создания и добавления элементов VIS
        function createVisElement() {
            const visElement = document.createElement('div');
            visElement.classList.add('vis');
            visElement.textContent = 'VIS';

            // Получаем случайное положение для элемента
            const randomTop = Math.floor(Math.random() * 100);
            const randomLeft = Math.floor(Math.random() * 100);

            visElement.style.top = `${randomTop}%`;
            visElement.style.left = `${randomLeft}%`;

            // Добавляем элемент на страницу
            document.body.appendChild(visElement);

            // Удаляем элемент через 5 секунд, чтобы не перегружать страницу
            setTimeout(() => {
                visElement.remove();
            }, 5000);
        }

        // Создаем элементы VIS каждые 0.5 секунды
        setInterval(createVisElement, 500);
    </script>

</body>
</html>
